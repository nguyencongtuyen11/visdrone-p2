# Train RL (crop-outcome) TREN detector CROP — cap KHOP (fix lech cap best_visdrone).
# Giong ft_rl_cloud_s42.yaml nhung include ft_crop_cloud + out-dir rieng + resume:false (train moi).
includes:
  - ft_crop_cloud.yaml

paths:
  dqn_out_dir: runs/ft_rl_crop/dqn
  checkpoint: runs/ft_rl_crop/dqn/best.pt

env:
  max_steps: 10

infer:
  max_slice_attempts: 14

train:
  seed: 42
  use_crop_outcome_reward: true
  eval_benchmark_images: 0
  optimize_every: 8
  num_envs: 6
  batch_size: 256
  min_replay: 512
  replay_size: 30000
  episodes: 6000
  eval_interval: 200
  eval_episodes: 30
  eval_slice_cost_weight: 0.0
  resume: false            # train moi, KHONG resume tu policy best_visdrone cu
  resume_interval: 100
  log_interval: 25
  epsilon_decay_steps: 9000
  guide_decay_steps: 9000
  curriculum_steps: 9000
  per_beta_frames: 120000
